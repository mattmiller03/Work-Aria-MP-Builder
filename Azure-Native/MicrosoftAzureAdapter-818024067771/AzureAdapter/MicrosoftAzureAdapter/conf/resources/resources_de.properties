6611=Größe der mit Routing-Zustellung übertragenen Meldungen in Byte (Vorschau)
6611.description=Die Gesamtgröße der Meldungen, die vom IoT Hub an einen Endpoint übermittelt wurden, in Byte. Sie können die Dimensionen EndpointName und EndpointType verwenden, um die Größe der Meldungen, die an Ihre verschiedenen Endpoints übermittelt wurden, in Byte anzuzeigen. Der Metrikwert erhöht sich für jede zugestellte Meldung, auch wenn die Nachricht an mehrere Endpoints übermittelt wird oder wenn die Nachricht mehrmals an denselben Endpoint übermittelt wird.
6612=Routing-Zustellungen (Vorschau)
6612.description=Die Anzahl der Versuche des IoT Hubs, Meldungen mithilfe von Routing an alle Endpoints zu übermitteln. Um die Anzahl der erfolgreichen oder fehlgeschlagenen Versuche anzuzeigen, verwenden Sie die Ergebnisdimension. Um den Grund für den Fehler anzuzeigen, z. B. „Ungültig“, „Verworfen“ oder „Verwaist“, verwenden Sie die Dimension FailureReasonCategory. Sie können auch die Dimensionen EndpointName und EndpointType verwenden, um zu verstehen, wie viele Meldungen an Ihre verschiedenen Endpoints übermittelt wurden. Der Metrikwert erhöht sich für jeden Zustellungsversuch um eins. Dies gilt auch, wenn die Meldung an mehrere Endpoints oder mehrmals an denselben Endpoint gesendet wird.
6613=Routing-Zustellungslatenz (Vorschau)
6613.description=Die durchschnittliche Latenz (Millisekunden) zwischen dem Meldungs-Ingress in den IoT Hub und dem Telemetriemeldungs-Ingress in einen Endpoint. Sie können die EndpointName- und EndpointType-Abmessungen verwenden, um die Latenz für Ihre verschiedenen Endpoints zu verstehen.
