6578.description=Die Häufigkeit, mit der Meldungen aufgrund von ausgefallenen Endpoints vom IoT Hub-Routing verworfen wurden. Dieser Wert zählt keine Meldungen, die an die Fallback-Route übermittelt wurden, da verworfene Meldungen nicht dorthin übermittelt werden.
