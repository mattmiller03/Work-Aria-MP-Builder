1560=Used capacity
1560.description=The amount of storage used by the storage account. For standard storage accounts, it's the sum of capacity used by blob, table, file, and queue. For premium storage accounts and Blob storage accounts, it is the same as BlobCapacity or FileCapacity.
1561=Transactions
1561.description=The number of requests made to a storage service or the specified API operation. This number includes successful and failed requests, as well as requests which produced errors. Use ResponseType dimension for the number of different type of response.
1562=Ingress
1562.description=The amount of ingress data, in bytes. This number includes ingress from an external client into Azure Storage as well as ingress within Azure.
1563=Egress
1563.description=The amount of egress data. This number includes egress to external client from Azure Storage as well as egress within Azure. As a result, this number does not reflect billable egress.
1564=Success Server Latency
1564.description=The average time used to process a successful request by Azure Storage. This value does not include the network latency specified in SuccessE2ELatency.
1565=Success E2E Latency
1565.description=The average end-to-end latency of successful requests made to a storage service or the specified API operation, in milliseconds. This value includes the required processing time within Azure Storage to read the request, send the response, and receive acknowledgment of the response.
1566=Availability
1566.description=The percentage of availability for the storage service or the specified API operation. Availability is calculated by taking the TotalBillableRequests value and dividing it by the number of applicable requests, including those that produced unexpected errors. All unexpected errors result in reduced availability for the storage service or the specified API operation.

