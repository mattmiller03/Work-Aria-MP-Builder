# The following waiting time will be added with collection interval for overall waiting
METRIC_COLLECTION_WAITING_TIME_IN_MINUTES=5

#threadcount controls how many threads are active while making calls to Azure services to get the service as Resource and thier properties.  
#This threadcount is per resource group, so the total number of threads will be this number times the number of resource group.
threadcount=10

#threadcount controls how many threads are active while making calls to Azure Monitoring service to get standard and custom metrics.  
#This threadcount is per resource group, so the total number of threads will be this number times the number of resource group.
metric_threadcount=10

#threadcount controls how many threads are active while making calls to make the relationship between azure Services.  
relationship_threadcount=10

