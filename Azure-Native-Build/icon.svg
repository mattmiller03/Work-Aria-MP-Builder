<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#001A33"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C5A227"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M32 2 L56 10 L56 30 C56 46 44 56 32 62 C20 56 8 46 8 30 L8 10 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Inner gold border -->
  <path d="M32 6 L52 13 L52 30 C52 43 42 52 32 57 C22 52 12 43 12 30 L12 13 Z"
        fill="none" stroke="#C5A227" stroke-width="0.8" opacity="0.6"/>

  <!-- Cloud symbol -->
  <path d="M22 34c-2.5 0-4.5-2-4.5-4.5 0-2.1 1.4-3.8 3.4-4.3C20.6 22.5 23 20 26 20c2.3 0 4.3 1.5 5 3.6C31.8 23.2 32.7 23 33.8 23c3.3 0 6 2.7 6 6 0 0.3 0 0.5-0.1 0.8C41.5 30.2 43 31.7 43 33.5c0 2.2-1.7 3.5-3.8 3.5H22z"
        fill="white" opacity="0.95"/>

  <!-- Three stars -->
  <polygon points="25,14 26,16.5 28.5,16.5 26.8,18 27.4,20.5 25,19 22.6,20.5 23.2,18 21.5,16.5 24,16.5"
           fill="#FFD700" opacity="0.9"/>
  <polygon points="32,11 33,13.5 35.5,13.5 33.8,15 34.4,17.5 32,16 29.6,17.5 30.2,15 28.5,13.5 31,13.5"
           fill="#FFD700" opacity="0.9"/>
  <polygon points="39,14 40,16.5 42.5,16.5 40.8,18 41.4,20.5 39,19 36.6,20.5 37.2,18 35.5,16.5 38,16.5"
           fill="#FFD700" opacity="0.9"/>

  <!-- Red accent stripe -->
  <rect x="20" y="38" width="24" height="2.5" rx="1.2" fill="#BF0A30" opacity="0.85"/>

  <!-- GOV CLOUD text -->
  <text x="32" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="5.5" font-weight="bold" fill="#FFD700" letter-spacing="0.8">GOV CLOUD</text>

  <!-- Small gear accents on cloud -->
  <circle cx="33" cy="28" r="2.5" fill="none" stroke="#C5A227" stroke-width="0.6" opacity="0.5"/>
  <circle cx="33" cy="28" r="1" fill="#C5A227" opacity="0.5"/>
</svg>
